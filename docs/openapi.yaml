                      - state
                      - roomId
                      - memberId
                    additionalProperties: false
  /api/v1/lobby/events:
    get:
      responses:
        "200":
          description: Default Response
  /api/v1/admin/active-room:
    get:
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                nullable: true
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                  createdAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  memberCount:
                    type: integer
                    minimum: 1
                    maximum: 5
                  onlineCount:
                    type: integer
                    minimum: 0
                    maximum: 5
                  maxMembers:
                    type: number
                    enum:
                      - 5
                  host:
                    nullable: true
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                      nickname:
                        type: string
                        minLength: 1
                        maxLength: 24
                      online:
                        type: boolean
                    required:
                      - id
                      - nickname
                      - online
                    additionalProperties: false
                  mode:
                    type: string
                    enum:
                      - idle
                      - vod
                      - live
                  content:
                    nullable: true
                    type: object
                    properties:
                      kind:
                        type: string
                        enum:
                          - vod
                          - live
                      id:
                        type: string
                        format: uuid
                        pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                      title:
                        type: string
                    required:
                      - kind
                      - title
                    additionalProperties: false
                  live:
                    type: object
                    properties:
                      state:
                        type: string
                        enum:
                          - offline
                          - online
                          - unknown
                      hasVideo:
                        type: boolean
                      hasAudio:
                        type: boolean
                      videoTrackCount:
                        type: integer
                        minimum: 0
                        maximum: 9007199254740991
                      audioTrackCount:
                        type: integer
                        minimum: 0
                        maximum: 9007199254740991
                      sourceBitrateMbps:
                        nullable: true
                        type: number
                        minimum: 0
                      sourcePacketLossPercent:
                        nullable: true
                        type: number
                        minimum: 0
                        maximum: 100
                      sourceHealth:
                        type: string
                        enum:
                          - good
                          - degraded
                          - poor
                          - unknown
                      checkedAt:
                        type: string
                        format: date-time
                        pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    required:
                      - state
                      - hasVideo
                      - hasAudio
                      - videoTrackCount
                      - audioTrackCount
                      - sourceBitrateMbps
                      - sourcePacketLossPercent
                      - sourceHealth
                      - checkedAt
                    additionalProperties: false
                required:
                  - id
                  - createdAt
                  - memberCount
                  - onlineCount
                  - maxMembers
                  - host
                  - mode
                  - content
                  - live
                additionalProperties: false
    delete:
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                  status:
                    type: string
                    enum:
                      - closed
                required:
                  - id
                  - status
                additionalProperties: false
  /api/v1/rooms:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
              additionalProperties: false
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  room:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                      joinUrl:
                        type: string
                        format: uri
                    required:
