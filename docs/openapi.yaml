                      properties:
                        id:
                          type: string
                          format: uuid
                          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                        nickname:
                          type: string
                          minLength: 1
                          maxLength: 24
                        role:
                          type: string
                          enum:
                            - host
                            - member
                        online:
                          type: boolean
                      required:
                        - id
                        - nickname
                        - role
                        - online
                      additionalProperties: false
                  serverNowMs:
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                required:
                  - roomId
                  - revision
                  - status
                  - mode
                  - media
                  - live
                  - transport
                  - hostMemberId
                  - members
                  - serverNowMs
                additionalProperties: false
