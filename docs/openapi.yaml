                properties:
                  roomId:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                  revision:
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                  status:
                    type: string
                    enum:
                      - active
                      - closed
                  mode:
                    type: string
                    enum:
                      - idle
                      - vod
                      - live
                  media:
                    nullable: true
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                      title:
                        type: string
                      durationSec:
                        type: number
                        minimum: 0
                    required:
                      - id
                      - title
                      - durationSec
                    additionalProperties: false
                  live:
                    nullable: true
                    type: object
                    properties:
                      state:
                        type: string
                        enum:
                          - offline
                          - connecting
                          - online
                    required:
                      - state
                    additionalProperties: false
                  transport:
                    nullable: true
                    type: object
                    properties:
                      state:
                        type: string
                        enum:
                          - playing
                          - paused
                      positionSec:
                        type: number
                        minimum: 0
                      rate:
                        type: number
                        minimum: 0.5
                        maximum: 2
                      anchoredAtServerMs:
                        type: integer
                        minimum: 0
                        maximum: 9007199254740991
                    required:
                      - state
                      - positionSec
                      - rate
                      - anchoredAtServerMs
                    additionalProperties: false
                  hostMemberId:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                  members:
                    type: array
                    items:
