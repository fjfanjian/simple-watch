openapi: 3.0.3
info:
  title: SimpleWatch API
  version: 0.1.0
components:
  schemas: {}
paths:
  /health/live:
    get:
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                required:
                  - status
                additionalProperties: false
  /health/ready:
    get:
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ready
                  database:
                    type: string
                    enum:
                      - ok
                required:
                  - status
                  - database
                additionalProperties: false
  /api/v1/auth/login:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 64
                password:
                  type: string
                  minLength: 1
                  maxLength: 128
              required:
                - username
                - password
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                      username:
                        type: string
                      role:
                        type: string
                        enum:
                          - host
                          - viewer
                    required:
                      - id
                      - username
                      - role
                    additionalProperties: false
                  csrfToken:
                    type: string
                  idleExpiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  absoluteExpiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  destination:
                    oneOf:
                      - type: object
                        properties:
                          state:
                            type: string
                            enum:
                              - admin
                        required:
                          - state
                        additionalProperties: false
                      - type: object
                        properties:
                          state:
                            type: string
                            enum:
                              - room
                          roomId:
                            type: string
                            format: uuid
                            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                          memberId:
                            type: string
                            format: uuid
                            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                          nickname:
                            type: string
                          role:
                            type: string
                            enum:
                              - host
                              - member
                          tookOver:
                            type: boolean
                        required:
                          - state
                          - roomId
                          - memberId
                          - nickname
                          - role
                          - tookOver
                        additionalProperties: false
                      - type: object
                        properties:
                          state:
                            type: string
                            enum:
                              - waiting
                          reason:
                            type: string
                            enum:
                              - no-room
                              - room-full
                              - left
                              - removed
                          roomId:
                            nullable: true
                            type: string
                            format: uuid
                            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                          position:
                            nullable: true
                            type: integer
                            exclusiveMinimum: true
                            maximum: 9007199254740991
                        required:
                          - state
                          - reason
                          - roomId
                          - position
                        additionalProperties: false
                      - type: object
                        properties:
                          state:
                            type: string
                            enum:
                              - taken-over
                          roomId:
                            type: string
                            format: uuid
                            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                          memberId:
                            type: string
                            format: uuid
                            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                        required:
                          - state
                          - roomId
                          - memberId
                        additionalProperties: false
                required:
                  - account
                  - csrfToken
                  - idleExpiresAt
                  - absoluteExpiresAt
                  - destination
                additionalProperties: false
  /api/v1/auth/session:
