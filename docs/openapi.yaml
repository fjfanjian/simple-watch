                    required:
                      - state
                      - roomId
                      - memberId
                    additionalProperties: false
  /api/v1/room/takeover:
    post:
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      state:
                        type: string
                        enum:
                          - admin
                    required:
                      - state
                    additionalProperties: false
                  - type: object
                    properties:
                      state:
                        type: string
                        enum:
                          - room
                      roomId:
                        type: string
                        format: uuid
                        pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                      memberId:
                        type: string
                        format: uuid
                        pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                      nickname:
                        type: string
                      role:
                        type: string
                        enum:
                          - host
                          - member
                      tookOver:
                        type: boolean
                    required:
                      - state
                      - roomId
                      - memberId
                      - nickname
                      - role
                      - tookOver
                    additionalProperties: false
                  - type: object
                    properties:
                      state:
                        type: string
                        enum:
                          - waiting
                      reason:
                        type: string
                        enum:
                          - no-room
                          - room-full
                          - left
                          - removed
                      roomId:
                        nullable: true
                        type: string
                        format: uuid
                        pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                      position:
                        nullable: true
                        type: integer
                        exclusiveMinimum: true
                        maximum: 9007199254740991
                    required:
                      - state
                      - reason
                      - roomId
                      - position
                    additionalProperties: false
                  - type: object
                    properties:
                      state:
                        type: string
                        enum:
                          - taken-over
                      roomId:
                        type: string
                        format: uuid
