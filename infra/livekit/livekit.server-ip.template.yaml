port: 7880
prometheus_port: 6789
rtc:
  tcp_port: 7881
  udp_port: 7882-7883
  use_external_ip: false
  node_ip: 8.134.239.34
  use_mdns: false
  # eth0 is the internal app network; force ICE sockets onto the published
  # RTC egress network so UDP checks do not leave with an unroutable source.
  interfaces:
    includes:
      - eth1
keys:
  __LIVEKIT_API_KEY__: __LIVEKIT_API_SECRET__
webhook:
  api_key: __LIVEKIT_API_KEY__
  urls:
    - http://app:3000/api/v1/internal/livekit/webhook
room:
  auto_create: true
  empty_timeout: 300
  departure_timeout: 20
  max_participants: 5
  enabled_codecs:
    - mime: audio/opus
    - mime: video/vp8
logging:
  level: info
  json: true
