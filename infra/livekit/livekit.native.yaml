port: 17880
prometheus_port: 16789

rtc:
  tcp_port: 17881
  udp_port: 17882-17883
  use_external_ip: false
  node_ip: 127.0.0.1
  use_mdns: false

keys:
  predeploy-api-key: predeploy-livekit-secret-at-least-32-bytes

webhook:
  api_key: predeploy-api-key
  urls:
    - http://127.0.0.1:13900/api/v1/internal/livekit/webhook

room:
  auto_create: true
  empty_timeout: 300
  departure_timeout: 20
  max_participants: 5
  enabled_codecs:
    - mime: audio/opus
    # Browser SDK subscription negotiation reserves video transceivers. Camera
    # publication remains forbidden by the participant JWT grant.
    - mime: video/vp8

logging:
  level: info
  json: true
