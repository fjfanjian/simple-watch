port: 7880
prometheus_port: 6789

rtc:
  tcp_port: 7881
  udp_port: 7882-7883
  use_external_ip: false
  node_ip: 127.0.0.1
  use_mdns: false

keys:
  local-api-key: local-livekit-secret-change-before-prod

webhook:
  api_key: local-api-key
  urls:
    - http://app:3000/api/v1/internal/livekit/webhook

room:
  auto_create: true
  empty_timeout: 300
  departure_timeout: 20
  max_participants: 5
  enabled_codecs:
    - mime: audio/opus
    # Browser SDK subscription negotiation reserves video transceivers. Camera
    # publication remains forbidden by the participant JWT grant.
    - mime: video/vp8

logging:
  level: info
  json: true
