name: simplewatch-server

services:
  app:
    build:
      context: ../..
      args:
        NODE_IMAGE: docker.m.daocloud.io/library/node:24.18.0-bookworm-slim
        APT_MIRROR: mirrors.aliyun.com
    image: simplewatch-app:${RELEASE_TAG}
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    command:
      ["node", "apps/api/node_modules/tsx/dist/cli.mjs", "apps/api/src/main.ts"]
    env_file: ../../.env.server
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      DATABASE_PATH: /state/simplewatch.sqlite3
      MEDIA_ROOT: /media
      UPLOAD_ROOT: /uploads
      INBOX_ROOT: /inbox
      SUBTITLE_ROOT: /subtitles
      SFTP_INCOMING_ROOT: /sftp-incoming
    volumes:
      - /srv/simplewatch/state:/state
      - /srv/simplewatch/media:/media
      - /srv/simplewatch/uploads:/uploads
      - /srv/simplewatch/inbox:/inbox
      - /srv/simplewatch/subtitles:/subtitles
      - /srv/simplewatch/sftp/incoming:/sftp-incoming
    networks: [sw_app]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 15s

  worker:
    image: simplewatch-app:${RELEASE_TAG}
    restart: unless-stopped
    group_add: ["12001"]
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    command:
      [
        "node",
        "apps/worker/node_modules/tsx/dist/cli.mjs",
        "apps/worker/src/main.ts",
      ]
    env_file: ../../.env.server
    environment:
      API_ORIGIN: http://app:3000
      WORKER_ID: server-worker
      MEDIA_ROOT: /media
      UPLOAD_ROOT: /uploads
      INBOX_ROOT: /inbox
      SUBTITLE_ROOT: /subtitles
      FFPROBE_PATH: /usr/bin/ffprobe
      SFTP_INCOMING_ROOT: /sftp-incoming
      LIVEKIT_INTERNAL_URL: http://livekit:7880
      MEDIAMTX_CONTROL_URL: http://mediamtx:9997
    volumes:
      - /srv/simplewatch/media:/media
      - /srv/simplewatch/uploads:/uploads
      - /srv/simplewatch/inbox:/inbox
      - /srv/simplewatch/subtitles:/subtitles
      - /srv/simplewatch/sftp/incoming:/sftp-incoming
    networks: [sw_app]
    depends_on:
      app:
        condition: service_healthy

  caddy:
    image: docker.m.daocloud.io/library/caddy:2.11.4-alpine
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    env_file: ../../.env.server
    ports:
      - "443:443"
    volumes:
      - ../caddy/Caddyfile.server-ip:/etc/caddy/Caddyfile:ro
      - /srv/simplewatch/ip-cert:/etc/caddy/ip-cert:ro
      - /srv/simplewatch/media:/srv/simplewatch/media:ro
      - /srv/simplewatch/caddy-data:/data
      - /srv/simplewatch/caddy-config:/config
    networks: [sw_app, sw_edge]
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:8080/health/live",
        ]
      interval: 5s
      timeout: 3s
      retries: 24

  tusd:
    image: docker.m.daocloud.io/tusproject/tusd:v2.9.2
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    command:
      - -host=0.0.0.0
      - -port=1080
      - -base-path=/files/
      - -behind-proxy
      - -upload-dir=/uploads
      - -hooks-http=http://caddy:8080/api/v1/internal/tus/hooks
      - -hooks-http-forward-headers=Upload-Token
      - -hooks-enabled-events=pre-create,post-create,post-receive,post-finish,post-terminate
    volumes:
      - /srv/simplewatch/uploads:/uploads
    networks: [sw_app]
    depends_on:
      app:
        condition: service_healthy

  mediamtx:
    build:
      context: ../..
      dockerfile: infra/images/mediamtx/Dockerfile
      args:
        MEDIAMTX_ARCHIVE_SHA256: ${MEDIAMTX_ARCHIVE_SHA256}
    image: simplewatch-mediamtx:${RELEASE_TAG}
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    ports:
      - "8189:8189/tcp"
      - "8189:8189/udp"
    volumes:
      - ../mediamtx/mediamtx.server-ip.yml:/mediamtx.yml:ro
    networks: [sw_app, sw_rtc_egress]
    depends_on:
      app:
        condition: service_healthy

  livekit:
    build:
      context: ../..
      dockerfile: infra/images/livekit/Dockerfile
      args:
        LIVEKIT_ARCHIVE_SHA256: ${LIVEKIT_ARCHIVE_SHA256}
    image: simplewatch-livekit:${RELEASE_TAG}
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    command: ["--config", "/etc/livekit.yaml"]
    ports:
      - "7881:7881/tcp"
      - "7882-7883:7882-7883/udp"
    volumes:
      - ../livekit/livekit.server-ip.yaml:/etc/livekit.yaml:ro
    networks: [sw_app, sw_rtc_egress]
    depends_on:
      app:
        condition: service_healthy

networks:
  sw_app:
    internal: true
  sw_edge: {}
  sw_rtc_egress: {}
